<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="f()">Click Me 1</button>
    <button id="btn">Click Me 2</button>
    <p id="para"></p>
</body>
<script>
    function f(){
        alert("Hello INCAPP!");
    }
    var b=document.getElementById("btn");
    b.addEventListener("click",(e)=>{
        alert(e.target.id);
        alert(e.target.innerText);
        document.getElementById("para").innerText="Hi India";
    })
    b.addEventListener("mouseover",()=>{
        document.getElementById("para").innerText="Namaste Incapp";
    })
</script>
</html>
